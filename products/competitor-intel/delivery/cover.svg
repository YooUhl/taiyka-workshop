<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Top label -->
  <text x="600" y="150" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="6" opacity="0.85">COMPETITOR INTELLIGENCE</text>

  <!-- Price badge (top-right) -->
  <g transform="translate(1020, 150)">
    <rect x="-90" y="-40" width="180" height="80" rx="40" fill="url(#accent)" filter="url(#softGlow)"/>
    <text x="0" y="16" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="900">49€</text>
  </g>

  <!-- Radar rings (center hero) -->
  <g transform="translate(600, 520)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="220" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.45"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
    <!-- radar sweep arm -->
    <path d="M 0 0 L 220 0 A 220 220 0 0 0 155 -155 Z" fill="url(#accent)" opacity="0.18"/>
    <!-- crosshairs -->
    <line x1="-240" y1="0" x2="240" y2="0" stroke="#00A6FF" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="-240" x2="0" y2="240" stroke="#00A6FF" stroke-width="1" opacity="0.35"/>
    <!-- center eye / pupil -->
    <circle cx="0" cy="0" r="32" fill="#0A1628" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#00E5FF"/>
    <!-- tracked blips -->
    <circle cx="120" cy="-70" r="8" fill="#00E5FF"/>
    <circle cx="-90" cy="130" r="8" fill="#00E5FF"/>
    <circle cx="170" cy="80" r="6" fill="#00A6FF" opacity="0.7"/>
    <circle cx="-160" cy="-50" r="6" fill="#00A6FF" opacity="0.7"/>
  </g>

  <!-- Title line 1 -->
  <text x="600" y="830" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800">Competitor Intel</text>
  <!-- Title line 2 -->
  <text x="600" y="905" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500">rapport stratégique hebdo, auto-généré</text>

  <!-- Divider -->
  <rect x="500" y="945" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Platform chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#E8F0FE">
    <g transform="translate(240, 990)">
      <rect width="170" height="52" rx="26" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="85" y="33" text-anchor="middle">📸 Instagram</text>
    </g>
    <g transform="translate(430, 990)">
      <rect width="150" height="52" rx="26" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="75" y="33" text-anchor="middle">🎵 TikTok</text>
    </g>
    <g transform="translate(600, 990)">
      <rect width="160" height="52" rx="26" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="80" y="33" text-anchor="middle">▶️ YouTube</text>
    </g>
    <g transform="translate(780, 990)">
      <rect width="170" height="52" rx="26" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="85" y="33" text-anchor="middle">💼 LinkedIn</text>
    </g>
    <g transform="translate(390, 1060)">
      <rect width="420" height="52" rx="26" fill="#1A2A4A" stroke="#00E5FF" stroke-width="1.5"/>
      <text x="210" y="33" text-anchor="middle">🤖 Claude · Rapport hebdo auto</text>
    </g>
  </g>

  <!-- Bottom brand -->
  <g transform="translate(600, 1160)">
    <circle cx="-80" cy="0" r="18" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="-80" cy="0" r="5" fill="#00E5FF"/>
    <text x="-50" y="7" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">TAIYKA</text>
    <text x="55" y="7" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500">· @manu_ai.to</text>
  </g>
</svg>
