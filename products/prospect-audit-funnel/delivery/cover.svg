  <g stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 480 460 L 550 460" marker-end="url(#arrow)"/>
    <path d="M 670 460 L 740 460" marker-end="url(#arrow)"/>
  </g>

  <text x="600" y="860" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800">Prospect Audit Funnel</text>
  <text x="600" y="920" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="500">AI-powered B2B qualification</text>
  <rect x="500" y="960" width="200" height="3" fill="url(#accent)" rx="2"/>

  <g transform="translate(600, 1020)">
    <rect x="-75" y="-26" width="150" height="52" rx="26" fill="url(#accent)"/>
    <text x="0" y="9" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900">49€</text>
  </g>

  <g transform="translate(600, 1100)">
