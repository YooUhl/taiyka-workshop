<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F2440"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00E5FF"/>
    </marker>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <text x="600" y="130" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="6" opacity="0.85">PROSPECT AUDIT FUNNEL</text>

  <g transform="translate(600, 460)" filter="url(#softGlow)">

    <g transform="translate(-280, -130)">
      <rect x="0" y="0" width="200" height="260" rx="16" fill="url(#paper)" stroke="#00A6FF" stroke-width="2.5"/>
      <rect x="20" y="28" width="100" height="10" rx="3" fill="#00E5FF" opacity="0.8"/>
      <rect x="20" y="50" width="160" height="22" rx="6" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1"/>
      <rect x="20" y="88" width="80" height="10" rx="3" fill="#00E5FF" opacity="0.8"/>
      <rect x="20" y="110" width="160" height="22" rx="6" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1"/>
      <rect x="20" y="148" width="120" height="10" rx="3" fill="#00E5FF" opacity="0.8"/>
      <rect x="20" y="170" width="160" height="22" rx="6" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1"/>
      <rect x="20" y="210" width="160" height="32" rx="16" fill="url(#accent)"/>
      <text x="100" y="231" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800">SUBMIT</text>
    </g>

    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="90" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
      <circle cx="0" cy="0" r="65" fill="#0A1628" stroke="#00E5FF" stroke-width="2.5"/>
      <circle cx="-25" cy="-25" r="6" fill="url(#accent)" filter="url(#strongGlow)"/>
      <circle cx="25" cy="-25" r="6" fill="url(#accent)" filter="url(#strongGlow)"/>
      <circle cx="0" cy="0" r="8" fill="#FFFFFF" filter="url(#strongGlow)"/>
      <circle cx="-25" cy="25" r="6" fill="url(#accent)" filter="url(#strongGlow)"/>
      <circle cx="25" cy="25" r="6" fill="url(#accent)" filter="url(#strongGlow)"/>
      <line x1="-25" y1="-25" x2="0" y2="0" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
      <line x1="25" y1="-25" x2="0" y2="0" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
      <line x1="-25" y1="25" x2="0" y2="0" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
      <line x1="25" y1="25" x2="0" y2="0" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
      <line x1="-25" y1="-25" x2="-25" y2="25" stroke="#00A6FF" stroke-width="1" opacity="0.4"/>
      <line x1="25" y1="-25" x2="25" y2="25" stroke="#00A6FF" stroke-width="1" opacity="0.4"/>
