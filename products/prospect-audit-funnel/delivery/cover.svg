      <rect x="0" y="0" width="200" height="40" rx="16" fill="url(#accent)"/>
      <rect x="0" y="20" width="200" height="20" fill="url(#accent)"/>
      <text x="100" y="27" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800">BOOK A CALL</text>
      <g fill="#1A2A4A" stroke="#00A6FF" stroke-width="0.5">
        <rect x="14" y="56" width="24" height="24" rx="3"/>
        <rect x="44" y="56" width="24" height="24" rx="3"/>
        <rect x="74" y="56" width="24" height="24" rx="3"/>
        <rect x="104" y="56" width="24" height="24" rx="3"/>
        <rect x="134" y="56" width="24" height="24" rx="3"/>
        <rect x="164" y="56" width="22" height="24" rx="3"/>
        <rect x="14" y="84" width="24" height="24" rx="3"/>
        <rect x="44" y="84" width="24" height="24" rx="3"/>
        <rect x="74" y="84" width="24" height="24" rx="3" fill="url(#accent)" opacity="0.9"/>
        <rect x="104" y="84" width="24" height="24" rx="3"/>
        <rect x="134" y="84" width="24" height="24" rx="3"/>
        <rect x="164" y="84" width="22" height="24" rx="3"/>
        <rect x="14" y="112" width="24" height="24" rx="3"/>
        <rect x="44" y="112" width="24" height="24" rx="3"/>
        <rect x="74" y="112" width="24" height="24" rx="3"/>
        <rect x="104" y="112" width="24" height="24" rx="3"/>
        <rect x="134" y="112" width="24" height="24" rx="3"/>
        <rect x="164" y="112" width="22" height="24" rx="3"/>
        <rect x="14" y="140" width="24" height="24" rx="3"/>
        <rect x="44" y="140" width="24" height="24" rx="3"/>
        <rect x="74" y="140" width="24" height="24" rx="3"/>
        <rect x="104" y="140" width="24" height="24" rx="3"/>
        <rect x="134" y="140" width="24" height="24" rx="3"/>
        <rect x="164" y="140" width="22" height="24" rx="3"/>
      </g>
      <rect x="14" y="180" width="172" height="20" rx="6" fill="url(#accent)" opacity="0.95"/>
      <text x="100" y="194" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">10:00 — 10:30 ✓</text>
      <rect x="14" y="206" width="172" height="20" rx="6" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1"/>
      <text x="100" y="220" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">14:30 — 15:00</text>
      <rect x="14" y="232" width="172" height="20" rx="6" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1"/>
      <text x="100" y="246" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">16:00 — 16:30</text>
