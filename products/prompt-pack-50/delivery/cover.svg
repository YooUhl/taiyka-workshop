<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Top label -->
  <text x="600" y="160" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="8" opacity="0.85">PROMPT PACK</text>

  <!-- Big number 50 -->
  <text x="600" y="560" text-anchor="middle" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="520" font-weight="900" filter="url(#softGlow)">50</text>

  <!-- Subtitle line 1 -->
  <text x="600" y="690" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800">prompts qui tournent</text>

  <!-- Subtitle line 2 -->
  <text x="600" y="760" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500">Claude · ChatGPT · n8n · Notion</text>

  <!-- Divider -->
  <rect x="500" y="820" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Category chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#E8F0FE">
    <g transform="translate(180, 880)">
      <rect width="180" height="50" rx="25" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="90" y="32" text-anchor="middle">✍️ Contenu</text>
    </g>
    <g transform="translate(380, 880)">
      <rect width="160" height="50" rx="25" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="80" y="32" text-anchor="middle">💰 Ventes</text>
    </g>
    <g transform="translate(560, 880)">
      <rect width="180" height="50" rx="25" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="90" y="32" text-anchor="middle">⚙️ Opérations</text>
    </g>
    <g transform="translate(760, 880)">
      <rect width="170" height="50" rx="25" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="85" y="32" text-anchor="middle">🔎 Recherche</text>
    </g>
    <g transform="translate(420, 950)">
      <rect width="360" height="50" rx="25" fill="#1A2A4A" stroke="#00E5FF" stroke-width="1.5"/>
      <text x="180" y="32" text-anchor="middle">💬 Support client — 10 prompts</text>
    </g>
  </g>

  <!-- Bottom brand -->
  <g transform="translate(600, 1080)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#00E5FF"/>
    <text x="40" y="8" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">TAIYKA</text>
  </g>
  <text x="600" y="1135" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">@manu_ai.to · 12€</text>
</svg>
