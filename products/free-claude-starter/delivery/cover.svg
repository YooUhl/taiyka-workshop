<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Top label -->
  <text x="600" y="170" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" letter-spacing="6" opacity="0.85">FREE · GRATUIT</text>

  <!-- Big wordmark "Claude" with gradient -->
  <text x="600" y="470" text-anchor="middle" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="220" font-weight="900" filter="url(#softGlow)">Claude</text>

  <!-- Sub wordmark "Code" -->
  <text x="600" y="600" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="800" letter-spacing="4">CODE</text>

  <!-- Subtitle line 1 -->
  <text x="600" y="700" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="700">Starter Pack</text>

  <!-- Subtitle line 2 -->
  <text x="600" y="755" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500">3 skills · setup en 30 minutes</text>

  <!-- Divider -->
  <rect x="500" y="810" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Skill chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#E8F0FE">
    <g transform="translate(220, 880)">
      <rect width="230" height="50" rx="25" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="115" y="32" text-anchor="middle">content-creator</text>
    </g>
    <g transform="translate(470, 880)">
      <rect width="240" height="50" rx="25" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="120" y="32" text-anchor="middle">morning-planner</text>
    </g>
    <g transform="translate(730, 880)">
      <rect width="250" height="50" rx="25" fill="#1A2A4A" stroke="#00E5FF" stroke-width="1.5"/>
      <text x="125" y="32" text-anchor="middle">excalidraw-diagram</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="1000" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" font-style="italic">drop them in ~/.claude/skills/ and ship</text>

  <!-- Bottom brand -->
  <g transform="translate(600, 1080)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#00E5FF"/>
    <text x="40" y="8" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">TAIYKA</text>
  </g>
  <text x="600" y="1135" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">@manu_ai.to</text>
</svg>
