<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Top label -->
  <text x="600" y="150" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="8" opacity="0.85">SOLOPRENEUR DASHBOARD</text>

  <!-- Wordmark line 1 -->
  <text x="600" y="330" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="900">NOTION</text>
  <!-- Wordmark line 2 (AI Stack gradient) -->
  <text x="600" y="460" text-anchor="middle" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="140" font-weight="900" filter="url(#softGlow)">AI STACK</text>

  <!-- Divider -->
  <rect x="500" y="510" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="600" y="570" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="500">5 databases · 1 command center · 3 rituels</text>

  <!-- Dashboard mockup block -->
  <g transform="translate(200, 640)">
    <!-- Frame -->
    <rect width="800" height="340" rx="16" fill="#0F1E35" stroke="#1A2A4A" stroke-width="2"/>
    <!-- Top bar -->
    <rect width="800" height="44" rx="16" fill="#162742"/>
    <circle cx="24" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="22" r="6" fill="#febc2e"/>
    <circle cx="64" cy="22" r="6" fill="#28c840"/>
    <text x="110" y="28" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">AI Stack Dashboard</text>

    <!-- Database cards -->
    <g font-family="Inter, system-ui, sans-serif" font-weight="700" fill="#FFFFFF">
      <!-- Row 1 -->
      <g transform="translate(30, 80)">
        <rect width="240" height="110" rx="12" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
        <text x="20" y="36" font-size="22">🧠 AI Tools</text>
        <text x="20" y="66" font-size="13" fill="#8DA2C0" font-weight="500">Category · Status · Cost</text>
        <text x="20" y="88" font-size="13" fill="#8DA2C0" font-weight="500">13 tools · 247€/mo</text>
      </g>
      <g transform="translate(290, 80)">
        <rect width="240" height="110" rx="12" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
        <text x="20" y="36" font-size="22">⚡ Backlog</text>
        <text x="20" y="66" font-size="13" fill="#8DA2C0" font-weight="500">Impact × Effort</text>
        <text x="20" y="88" font-size="13" fill="#8DA2C0" font-weight="500">3 building · 12 ideas</text>
      </g>
      <g transform="translate(550, 80)">
        <rect width="220" height="110" rx="12" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
        <text x="20" y="36" font-size="22">📚 Prompts</text>
        <text x="20" y="66" font-size="13" fill="#8DA2C0" font-weight="500">Library · Favorites</text>
        <text x="20" y="88" font-size="13" fill="#8DA2C0" font-weight="500">50+ prompts ready</text>
      </g>
      <!-- Row 2 -->
      <g transform="translate(30, 210)">
        <rect width="370" height="110" rx="12" fill="#1A2A4A" stroke="#00E5FF" stroke-width="1.5"/>
        <text x="20" y="36" font-size="22">🧑‍💼 Clients</text>
        <text x="20" y="66" font-size="13" fill="#8DA2C0" font-weight="500">Pipeline · Relations · Rollup revenue</text>
        <text x="20" y="88" font-size="13" fill="#8DA2C0" font-weight="500">Prospect → Active → Past</text>
      </g>
      <g transform="translate(420, 210)">
        <rect width="350" height="110" rx="12" fill="#1A2A4A" stroke="#00E5FF" stroke-width="1.5"/>
        <text x="20" y="36" font-size="22">📦 Projects</text>
        <text x="20" y="66" font-size="13" fill="#8DA2C0" font-weight="500">Timeline · Billing · Post-mortem</text>
        <text x="20" y="88" font-size="13" fill="#8DA2C0" font-weight="500">Linked to Clients + Tools</text>
      </g>
    </g>
  </g>

  <!-- Bottom brand -->
  <g transform="translate(600, 1080)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#00E5FF"/>
    <text x="40" y="8" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">TAIYKA</text>
  </g>
  <text x="600" y="1135" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">@manu_ai.to · 15€</text>
</svg>
