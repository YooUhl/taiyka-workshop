<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Top label -->
  <text x="600" y="170" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" letter-spacing="6" opacity="0.85">COLD OUTREACH PACK</text>

  <!-- Hero: 1 → 100 leads -->
  <g filter="url(#softGlow)">
    <text x="600" y="500" text-anchor="middle" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="280" font-weight="900">1 → 100</text>
  </g>

  <!-- Subtitle line 1 -->
  <text x="600" y="640" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800">cold emails, automated</text>

  <!-- Subtitle line 2 -->
  <text x="600" y="720" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="500">Google Maps → Email → Claude → Gmail</text>

  <!-- Divider -->
  <rect x="500" y="790" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Pipeline chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#E8F0FE">
    <g transform="translate(150, 870)">
      <rect width="200" height="54" rx="27" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="100" y="34" text-anchor="middle">🗺️ Scrape leads</text>
    </g>
    <g transform="translate(375, 870)">
      <rect width="200" height="54" rx="27" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="100" y="34" text-anchor="middle">🎯 Find email</text>
    </g>
    <g transform="translate(600, 870)">
      <rect width="220" height="54" rx="27" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="110" y="34" text-anchor="middle">🤖 AI icebreaker</text>
    </g>
    <g transform="translate(845, 870)">
      <rect width="200" height="54" rx="27" fill="#1A2A4A" stroke="#00E5FF" stroke-width="1.5"/>
      <text x="100" y="34" text-anchor="middle">✉️ Gmail send</text>
    </g>
  </g>

  <!-- Price badge -->
  <g transform="translate(600, 990)">
    <rect x="-90" y="-30" width="180" height="60" rx="30" fill="url(#accent)"/>
    <text x="0" y="13" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900">19€</text>
  </g>

  <!-- Bottom brand -->
  <g transform="translate(600, 1080)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#00E5FF"/>
    <text x="40" y="8" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">TAIYKA</text>
  </g>
  <text x="600" y="1135" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">@manu_ai.to</text>
</svg>
