<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F0FE"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Top label -->
  <text x="600" y="150" text-anchor="middle" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" letter-spacing="6" opacity="0.85">CLIENT ACQUISITION BUNDLE</text>

  <!-- Stack of 3 documents -->
  <g transform="translate(600, 470)" filter="url(#softShadow)">
    <!-- Back doc: invoice (rotated -8deg) -->
    <g transform="rotate(-8) translate(-150, -180)">
      <rect width="300" height="380" rx="10" fill="url(#paper)" stroke="#1A2A4A" stroke-width="2"/>
      <rect x="0" y="0" width="300" height="40" rx="10" fill="#0A1628"/>
      <text x="20" y="27" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">INVOICE</text>
      <rect x="20" y="65" width="160" height="6" rx="3" fill="#0A1628" opacity="0.4"/>
      <rect x="20" y="80" width="120" height="6" rx="3" fill="#0A1628" opacity="0.25"/>
      <rect x="20" y="120" width="260" height="3" rx="1.5" fill="#00A6FF" opacity="0.3"/>
      <rect x="20" y="140" width="220" height="6" rx="3" fill="#0A1628" opacity="0.35"/>
      <rect x="20" y="155" width="200" height="6" rx="3" fill="#0A1628" opacity="0.35"/>
      <rect x="20" y="170" width="240" height="6" rx="3" fill="#0A1628" opacity="0.35"/>
      <rect x="180" y="320" width="100" height="32" rx="6" fill="#00A6FF"/>
      <text x="230" y="342" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">€2,500</text>
    </g>

    <!-- Middle doc: contract (rotated +5deg) -->
    <g transform="rotate(5) translate(-150, -180)">
      <rect width="300" height="380" rx="10" fill="url(#paper)" stroke="#1A2A4A" stroke-width="2"/>
      <rect x="0" y="0" width="300" height="40" rx="10" fill="#0A1628"/>
      <text x="20" y="27" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">CONTRACT</text>
      <rect x="20" y="65" width="180" height="6" rx="3" fill="#0A1628" opacity="0.4"/>
      <rect x="20" y="80" width="140" height="6" rx="3" fill="#0A1628" opacity="0.25"/>
      <rect x="20" y="115" width="260" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="128" width="260" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="141" width="220" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="170" width="260" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="183" width="240" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="196" width="200" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <path d="M 20 320 Q 60 305, 90 325 T 160 320" stroke="#00A6FF" stroke-width="2.5" fill="none"/>
      <text x="20" y="350" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.6">Signature</text>
    </g>

    <!-- Front doc: proposal (no rotation) -->
    <g transform="translate(-150, -180)">
      <rect width="300" height="380" rx="10" fill="url(#paper)" stroke="#1A2A4A" stroke-width="2"/>
      <rect x="0" y="0" width="300" height="40" rx="10" fill="#0A1628"/>
      <text x="20" y="27" fill="#00E5FF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">PROPOSAL</text>
      <rect x="20" y="65" width="180" height="8" rx="4" fill="#0A1628" opacity="0.7"/>
      <rect x="20" y="82" width="140" height="6" rx="3" fill="#0A1628" opacity="0.35"/>
      <rect x="20" y="120" width="260" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="133" width="260" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="146" width="200" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <circle cx="30" cy="180" r="3" fill="#00A6FF"/>
      <rect x="40" y="177" width="220" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <circle cx="30" cy="195" r="3" fill="#00A6FF"/>
      <rect x="40" y="192" width="200" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <circle cx="30" cy="210" r="3" fill="#00A6FF"/>
      <rect x="40" y="207" width="230" height="4" rx="2" fill="#0A1628" opacity="0.3"/>
      <rect x="20" y="320" width="260" height="40" rx="6" fill="url(#accent)"/>
      <text x="150" y="346" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800">SCOPE • PRICE • TIMELINE</text>
    </g>
  </g>

  <!-- Price badge -->
  <g transform="translate(950, 280)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="100" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    <text x="0" y="14" text-anchor="middle" fill="#0A1628" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900">39€</text>
  </g>

  <!-- Subtitle line 1 -->
  <text x="600" y="900" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800">Contracts. Proposals. Invoices.</text>

  <!-- Subtitle line 2 -->
  <text x="600" y="955" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500">Bilingues FR/EN — templates + Python builders</text>

  <!-- Divider -->
  <rect x="500" y="1000" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- Bottom brand -->
  <g transform="translate(600, 1080)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#00E5FF"/>
    <text x="40" y="8" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">TAIYKA</text>
  </g>
  <text x="600" y="1135" text-anchor="middle" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">@manu_ai.to</text>
</svg>
