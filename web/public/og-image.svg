<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- TAIYKA wordmark -->
  <text x="80" y="280" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="900" letter-spacing="-2">TAIYKA</text>

  <!-- Tagline -->
  <text x="80" y="370" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="700">AI Automation Systems</text>
  <text x="80" y="425" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500">for entrepreneurs</text>

  <!-- Pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#E8F0FE">
    <g transform="translate(80, 480)">
      <rect width="160" height="44" rx="22" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="80" y="29" text-anchor="middle">📦 n8n workflows</text>
    </g>
    <g transform="translate(255, 480)">
      <rect width="160" height="44" rx="22" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="80" y="29" text-anchor="middle">🤖 Claude skills</text>
    </g>
    <g transform="translate(430, 480)">
      <rect width="160" height="44" rx="22" fill="#1A2A4A" stroke="#00A6FF" stroke-width="1.5"/>
      <text x="80" y="29" text-anchor="middle">📘 Playbooks IA</text>
    </g>
  </g>

  <!-- Right side: stylized gear -->
  <g transform="translate(940, 290)" fill="url(#accent)">
    <circle r="120"/>
  </g>
  <circle cx="940" cy="290" r="50" fill="#0A1628"/>
  <g transform="translate(940, 290)" fill="url(#accent)">
    <rect x="-15" y="-150" width="30" height="40" rx="3"/>
    <rect x="-15" y="110" width="30" height="40" rx="3"/>
    <rect x="-150" y="-15" width="40" height="30" rx="3"/>
    <rect x="110" y="-15" width="40" height="30" rx="3"/>
    <rect x="-15" y="-150" width="30" height="40" rx="3" transform="rotate(45)"/>
    <rect x="-15" y="-150" width="30" height="40" rx="3" transform="rotate(-45)"/>
    <rect x="-15" y="110" width="30" height="40" rx="3" transform="rotate(45)"/>
    <rect x="-15" y="110" width="30" height="40" rx="3" transform="rotate(-45)"/>
  </g>

  <!-- Bottom handle -->
  <text x="80" y="595" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">@manu_ai.to · taiyka.com</text>
</svg>
