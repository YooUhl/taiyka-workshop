<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#050B14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top kicker -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#8DA2C0" letter-spacing="4">
    <circle cx="80" cy="74" r="5" fill="#00A6FF">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="80">§ COMMUNAUTÉ · LANCEMENT EN COURS</text>
  </g>

  <!-- Headline -->
  <text x="80" y="270" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" letter-spacing="-3">T'as plus besoin</text>
  <text x="80" y="365" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" letter-spacing="-3">d'une formation.</text>

  <!-- Subline -->
  <text x="80" y="445" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600">T'as besoin d'être au bon endroit.</text>
  <text x="80" y="495" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500">Communauté de gens qui buildent des agents IA pour de vrai.</text>

  <!-- Hairline -->
  <rect x="80" y="540" width="1040" height="1" fill="#8DA2C0" opacity="0.20"/>

  <!-- Footer mark -->
  <text x="80" y="595" fill="#8DA2C0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3">TAIYKA · SKOOL</text>
  <text x="1120" y="595" text-anchor="end" fill="#00A6FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" font-weight="700">REJOINDRE →</text>
</svg>
