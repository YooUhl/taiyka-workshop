<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#050B14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00A6FF" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#00A6FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00A6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top kicker -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#8DA2C0" letter-spacing="4">
    <circle cx="80" cy="74" r="5" fill="#00A6FF"/>
    <text x="100" y="80">§ PRODUIT · TIER 2 · PLUG-AND-PLAY</text>
  </g>

  <!-- Headline -->
  <text x="80" y="270" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="-3">Qualifie tes prospects</text>
  <text x="80" y="355" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="-3">pendant que tu dors.</text>

  <!-- Subline -->
  <text x="80" y="425" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="600">Form + Claude + debrief auto.</text>
  <text x="80" y="470" fill="#8DA2C0" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500">Le funnel d'audit IA que j'utilise chez Taiyka.</text>

  <!-- Price badge right -->
  <g transform="translate(980, 290)">
    <rect x="-90" y="-90" width="180" height="180" rx="20" fill="#0A1628" stroke="url(#accent)" stroke-width="3"/>
    <text x="0" y="-10" text-anchor="middle" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" letter-spacing="-3">49€</text>
    <text x="0" y="40" text-anchor="middle" fill="#8DA2C0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3">ONE-TIME</text>
  </g>

  <!-- Hairline -->
  <rect x="80" y="540" width="1040" height="1" fill="#8DA2C0" opacity="0.20"/>

  <!-- Footer mark -->
  <text x="80" y="595" fill="#8DA2C0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3">TAIYKA · @MANU_AI.TO</text>
  <text x="1120" y="595" text-anchor="end" fill="#00A6FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" font-weight="700">GUMROAD →</text>
</svg>
