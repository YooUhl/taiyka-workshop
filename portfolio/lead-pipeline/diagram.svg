<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1864ab"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0b7285"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f9e44"/>
    </marker>
    <marker id="arrow-charcoal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#343a40"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0A1628">Multi-Platform Lead Pipeline</text>

  <!-- n8n trigger -->
  <rect x="30" y="220" width="160" height="100" rx="14" fill="#f1f3f5" stroke="#343a40" stroke-width="2"/>
  <text x="110" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#0A1628">n8n</text>
  <text x="110" y="280" text-anchor="middle" font-size="12" fill="#343a40">Daily cron</text>
  <text x="110" y="298" text-anchor="middle" font-size="12" fill="#343a40">Orchestrator</text>

  <!-- Arrow to collectors -->
  <line x1="195" y1="270" x2="255" y2="270" stroke="#343a40" stroke-width="2.5" marker-end="url(#arrow-charcoal)"/>

  <!-- Collectors grid -->
  <rect x="260" y="80" width="280" height="380" rx="14" fill="#e8f0fe" stroke="#1a2a4a" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1a2a4a">6 Platform Collectors (Python)</text>

  <g font-size="13" fill="#0A1628">
    <rect x="280" y="128" width="110" height="48" rx="8" fill="#dbe4ff" stroke="#1864ab" stroke-width="1.5"/>
    <text x="335" y="157" text-anchor="middle">Instagram</text>
    <rect x="410" y="128" width="110" height="48" rx="8" fill="#dbe4ff" stroke="#1864ab" stroke-width="1.5"/>
    <text x="465" y="157" text-anchor="middle">TikTok</text>

    <rect x="280" y="188" width="110" height="48" rx="8" fill="#dbe4ff" stroke="#1864ab" stroke-width="1.5"/>
    <text x="335" y="217" text-anchor="middle">Facebook</text>
    <rect x="410" y="188" width="110" height="48" rx="8" fill="#dbe4ff" stroke="#1864ab" stroke-width="1.5"/>
    <text x="465" y="217" text-anchor="middle">Twitter</text>

    <rect x="280" y="248" width="110" height="48" rx="8" fill="#dbe4ff" stroke="#1864ab" stroke-width="1.5"/>
    <text x="335" y="277" text-anchor="middle">YouTube</text>
    <rect x="410" y="248" width="110" height="48" rx="8" fill="#dbe4ff" stroke="#1864ab" stroke-width="1.5"/>
    <text x="465" y="277" text-anchor="middle">LinkedIn</text>
  </g>

  <!-- Apify layer -->
  <rect x="280" y="320" width="240" height="60" rx="10" fill="#e3fafc" stroke="#0b7285" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#0b7285">Apify Actors</text>
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#343a40">One actor per platform</text>

  <!-- Qualification filter -->
  <rect x="280" y="395" width="240" height="50" rx="10" fill="#74c0fc" stroke="#1971c2" stroke-width="2"/>
  <text x="400" y="418" text-anchor="middle" font-size="13" font-weight="700" fill="#0A1628">Claude qualification filter</text>
  <text x="400" y="436" text-anchor="middle" font-size="11" fill="#0A1628">Keywords · audience · engagement</text>

  <!-- Arrow from collectors grid to supabase -->
  <line x1="545" y1="220" x2="625" y2="180" stroke="#1864ab" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="545" y1="300" x2="625" y2="335" stroke="#2f9e44" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Supabase -->
  <rect x="630" y="130" width="230" height="110" rx="14" fill="#dbe4ff" stroke="#1864ab" stroke-width="2.5"/>
  <text x="745" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#1864ab">Supabase</text>
  <text x="745" y="190" text-anchor="middle" font-size="12" fill="#343a40">Leads table · dedup index</text>
  <text x="745" y="208" text-anchor="middle" font-size="12" fill="#343a40">Scoring · tags · history</text>
  <text x="745" y="228" text-anchor="middle" font-size="11" fill="#8DA2C0" font-style="italic">Source of truth</text>

  <!-- Google Sheets -->
  <rect x="630" y="290" width="230" height="110" rx="14" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="745" y="325" text-anchor="middle" font-size="16" font-weight="700" fill="#2f9e44">Google Sheets</text>
  <text x="745" y="350" text-anchor="middle" font-size="12" fill="#343a40">Sales operational surface</text>
  <text x="745" y="368" text-anchor="middle" font-size="12" fill="#343a40">Mobile-friendly · live sync</text>
  <text x="745" y="388" text-anchor="middle" font-size="11" fill="#8DA2C0" font-style="italic">Read by sales team</text>

  <!-- Supabase <-> Sheets sync arrow -->
  <line x1="745" y1="245" x2="745" y2="285" stroke="#1864ab" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
  <text x="760" y="270" font-size="10" fill="#8DA2C0" font-style="italic">sync</text>

  <text x="450" y="495" text-anchor="middle" font-size="12" fill="#8DA2C0" font-style="italic">Modular: add a platform = add one collector</text>
</svg>
