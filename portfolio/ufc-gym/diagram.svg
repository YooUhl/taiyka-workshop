<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1864ab"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0b7285"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f9e44"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0A1628">UFC Gym — Member + Staff App</text>

  <!-- Users on left -->
  <rect x="30" y="100" width="170" height="110" rx="14" fill="#dbe4ff" stroke="#1864ab" stroke-width="2"/>
  <text x="115" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#1864ab">Member</text>
  <text x="115" y="160" text-anchor="middle" font-size="12" fill="#343a40">QR check-in</text>
  <text x="115" y="178" text-anchor="middle" font-size="12" fill="#343a40">Name search</text>
  <text x="115" y="196" text-anchor="middle" font-size="12" fill="#343a40">View profile</text>

  <rect x="30" y="240" width="170" height="110" rx="14" fill="#dbe4ff" stroke="#1864ab" stroke-width="2"/>
  <text x="115" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#1864ab">Staff</text>
  <text x="115" y="300" text-anchor="middle" font-size="12" fill="#343a40">Subscriptions</text>
  <text x="115" y="318" text-anchor="middle" font-size="12" fill="#343a40">Live capacity</text>
  <text x="115" y="336" text-anchor="middle" font-size="12" fill="#343a40">Manual CRUD</text>

  <!-- Arrows users -> app -->
  <line x1="205" y1="155" x2="305" y2="220" stroke="#1864ab" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="205" y1="295" x2="305" y2="280" stroke="#1864ab" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- Next.js app -->
  <rect x="310" y="180" width="220" height="160" rx="14" fill="#74c0fc" stroke="#1971c2" stroke-width="2.5"/>
  <text x="420" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#0A1628">Next.js Web App</text>
  <text x="420" y="240" text-anchor="middle" font-size="12" fill="#0A1628">TypeScript + Tailwind</text>
  <text x="420" y="258" text-anchor="middle" font-size="12" fill="#0A1628">shadcn/ui</text>
  <text x="420" y="285" text-anchor="middle" font-size="12" fill="#0A1628">2 roles · French UI</text>
  <text x="420" y="303" text-anchor="middle" font-size="12" fill="#0A1628">GDPR compliant</text>
  <text x="420" y="325" text-anchor="middle" font-size="11" fill="#343a40" font-style="italic">Deployed on Vercel</text>

  <!-- Arrow app -> Supabase -->
  <line x1="535" y1="230" x2="620" y2="175" stroke="#0b7285" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <!-- Arrow app -> WhatsApp -->
  <line x1="535" y1="290" x2="620" y2="345" stroke="#2f9e44" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Supabase -->
  <rect x="625" y="120" width="230" height="110" rx="14" fill="#e3fafc" stroke="#0b7285" stroke-width="2"/>
  <text x="740" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#0b7285">Supabase</text>
  <text x="740" y="180" text-anchor="middle" font-size="12" fill="#343a40">Members · Subscriptions</text>
  <text x="740" y="198" text-anchor="middle" font-size="12" fill="#343a40">Check-ins · Auth (RLS)</text>
  <text x="740" y="218" text-anchor="middle" font-size="11" fill="#8DA2C0" font-style="italic">Source of truth</text>

  <!-- WhatsApp -->
  <rect x="625" y="300" width="230" height="110" rx="14" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="740" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#2f9e44">WhatsApp API</text>
  <text x="740" y="360" text-anchor="middle" font-size="12" fill="#343a40">Renewal reminders</text>
  <text x="740" y="378" text-anchor="middle" font-size="12" fill="#343a40">Session notifications</text>
  <text x="740" y="398" text-anchor="middle" font-size="11" fill="#8DA2C0" font-style="italic">Auto-triggered</text>

  <text x="450" y="470" text-anchor="middle" font-size="12" fill="#8DA2C0" font-style="italic">Built for Wallis &amp; Futuna — unstable connection, non-technical staff</text>
</svg>
