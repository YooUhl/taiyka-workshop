  <line x1="565" y1="280" x2="640" y2="280" stroke="#2f9e44" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <line x1="565" y1="300" x2="640" y2="410" stroke="#2f9e44" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <rect x="645" y="110" width="220" height="80" rx="14" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="755" y="145" text-anchor="middle" font-size="15" font-weight="700" fill="#2f9e44">Video Script</text>
  <text x="755" y="170" text-anchor="middle" font-size="12" fill="#343a40">Hook + body + close + director notes</text>

