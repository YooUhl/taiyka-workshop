  <text x="135" y="428" text-anchor="middle" font-size="11" fill="#8DA2C0" font-style="italic">CLI call</text>

  <!-- Arrows to skill -->
  <line x1="245" y1="145" x2="335" y2="230" stroke="#1864ab" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="245" y1="275" x2="335" y2="270" stroke="#1864ab" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="245" y1="405" x2="335" y2="310" stroke="#1864ab" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- content-creator skill -->
  <rect x="340" y="210" width="220" height="140" rx="14" fill="#74c0fc" stroke="#1971c2" stroke-width="2.5"/>
