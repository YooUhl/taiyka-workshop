  <rect x="645" y="370" width="220" height="80" rx="14" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="755" y="405" text-anchor="middle" font-size="15" font-weight="700" fill="#2f9e44">Caption</text>
