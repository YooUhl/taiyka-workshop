  <text x="135" y="188" text-anchor="middle" font-size="11" fill="#8DA2C0" font-style="italic">Voice reference</text>

  <rect x="30" y="220" width="210" height="110" rx="14" fill="#e8f0fe" stroke="#1a2a4a" stroke-width="2"/>
  <text x="135" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#1a2a4a">Audience Persona</text>
  <text x="135" y="280" text-anchor="middle" font-size="12" fill="#343a40">French AI /</text>
  <text x="135" y="298" text-anchor="middle" font-size="12" fill="#343a40">automation founders</text>

  <rect x="30" y="350" width="210" height="110" rx="14" fill="#e8f0fe" stroke="#1a2a4a" stroke-width="2"/>
